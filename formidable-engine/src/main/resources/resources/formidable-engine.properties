fmdbmix_actionConfig=Formidable - Form Actions
fmdbmix_formAction=Form Action

fmdb_save2jcrAction=Save to JCR
fmdb_save2jcrAction.ui.tooltip=Saves the submitted form data as child nodes under a designated JCR path.

fmdb_forwardAction=Forward Data
fmdb_forwardAction.ui.tooltip=Forwards the complete form data (including files) to a third-party endpoint (multipart/form-data). CAPTCHA token fields are stripped before forwarding.
fmdb_forwardAction.targetId=Forward Target
fmdb_forwardAction.targetId.ui.tooltip=The list of available targets is managed by an administrator.

fmdb_emailNotificationAction=Email Notification
fmdb_emailNotificationAction.ui.tooltip=Sends an email notification after a successful form submission. Subject and body support ${fieldName} interpolation.
fmdb_emailNotificationAction.to=Recipient (To)
fmdb_emailNotificationAction.to.ui.tooltip=Email address of the recipient.<br/><b>Example:</b> <i>contact@example.com</i>.
fmdb_emailNotificationAction.from=Sender (From)
fmdb_emailNotificationAction.from.ui.tooltip=Email address displayed as the sender.<br/><b>Example:</b> <i>no-reply@example.com</i>.
fmdb_emailNotificationAction.subject=Subject
fmdb_emailNotificationAction.subject.ui.tooltip=Subject line of the email. Supports ${fieldName} interpolation.<br/><b>Example:</b> <i>New message from ${firstname}</i>.
fmdb_emailNotificationAction.templateMessage=Message body
fmdb_emailNotificationAction.templateMessage.ui.tooltip=Body of the email. Supports ${fieldName} interpolation.<br/><b>Example:</b> <i>Name: ${firstname} ${lastname}\nMessage: ${message}</i>.

fmdb_emailContentAction=Email Form Content
fmdb_emailContentAction.ui.tooltip=Sends the submitted form content by email. The email subject uses the submitted form title and can optionally include uploaded files as attachments.
fmdb_emailContentAction.to=Recipient (To)
fmdb_emailContentAction.to.ui.tooltip=Email address of the recipient.<br/><b>Example:</b> <i>contact@example.com</i>.
fmdb_emailContentAction.from=Sender (From)
fmdb_emailContentAction.from.ui.tooltip=Email address displayed as the sender.<br/><b>Example:</b> <i>no-reply@example.com</i>.
fmdb_emailContentAction.attachFiles=Attach uploaded files
fmdb_emailContentAction.attachFiles.ui.tooltip=Attach validated uploaded files to the email when the form contains file inputs.
fmdb_emailContentAction.maxAttachmentSizeMb=Max attachment size (MB)
fmdb_emailContentAction.maxAttachmentSizeMb.ui.tooltip=Maximum size allowed per attached file for this email action.<br/><b>Note:</b> <i>The effective limit can never exceed the global upload limit configured on the module.</i><br/><b>Example:</b> <i>5</i>.

fmdbmix_captcha=CAPTCHA
fmdbmix_captcha.ui.tooltip=Enable CAPTCHA protection on this form. The widget is injected automatically using the global configuration (org.jahia.modules.formidable.captcha.cfg). The token is always verified server-side.
