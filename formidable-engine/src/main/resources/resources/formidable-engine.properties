fmdbmix_actionConfig=Formidable - Form Actions
fmdbmix_formAction=Form Action

fmdb_save2jcrAction=Save to JCR
fmdb_save2jcrAction.ui.tooltip=Saves the submitted form data as child nodes under a designated JCR path.

fmdb_forwardAction=Forward Data
fmdb_forwardAction.ui.tooltip=Forwards the complete form data (including files) to a third-party endpoint (multipart/form-data). CAPTCHA token fields are stripped before forwarding.
fmdb_forwardAction.targetUrl=Target URL
fmdb_forwardAction.targetUrl.ui.tooltip=URL of the third-party endpoint that will receive the form data.<br/><b>Example:</b> <i>https://api.example.com/submit</i>.

fmdb_emailAction=Email Notification
fmdb_emailAction.ui.tooltip=Sends an email notification after a successful form submission. Subject and body support ${fieldName} interpolation.
fmdb_emailAction.to=Recipient (To)
fmdb_emailAction.to.ui.tooltip=Email address of the recipient.<br/><b>Example:</b> <i>contact@example.com</i>.
fmdb_emailAction.from=Sender (From)
fmdb_emailAction.from.ui.tooltip=Email address displayed as the sender.<br/><b>Example:</b> <i>no-reply@example.com</i>.
fmdb_emailAction.subject=Subject
fmdb_emailAction.subject.ui.tooltip=Subject line of the email. Supports ${fieldName} interpolation.<br/><b>Example:</b> <i>New message from ${firstname}</i>.
fmdb_emailAction.templateMessage=Message body
fmdb_emailAction.templateMessage.ui.tooltip=Body of the email. Supports ${fieldName} interpolation.<br/><b>Example:</b> <i>Name: ${firstname} ${lastname}\nMessage: ${message}</i>.

fmdbmix_captcha=CAPTCHA
fmdbmix_captcha.ui.tooltip=Enable CAPTCHA protection on this form. The widget is injected automatically using the global configuration (org.jahia.modules.formidable.captcha.cfg). The token is always verified server-side.
