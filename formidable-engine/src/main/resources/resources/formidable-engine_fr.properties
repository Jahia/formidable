fmdbmix_actionConfig=Formidable - Actions de formulaire

fmdbmix_captcha=CAPTCHA
fmdbmix_captcha.ui.tooltip=Active la protection CAPTCHA sur ce formulaire. Le widget est injecté automatiquement via la configuration globale (org.jahia.modules.formidable.captcha.cfg). Le jeton est toujours vérifié côté serveur.

fmdb_emailAction=Action Email
fmdb_emailAction.ui.tooltip=Envoie une notification par email après une soumission réussie. L'objet et le corps supportent l'interpolation ${nomDuChamp}.
fmdb_emailAction.to=Destinataire (À)
fmdb_emailAction.to.ui.tooltip=Adresse email du destinataire.<br/><b>Exemple :</b> <i>contact@example.com</i>.
fmdb_emailAction.from=Expéditeur (De)
fmdb_emailAction.from.ui.tooltip=Adresse email affichée comme expéditeur.<br/><b>Exemple :</b> <i>no-reply@example.com</i>.
fmdb_emailAction.subject=Objet
fmdb_emailAction.subject.ui.tooltip=Objet de l'email. Supporte l'interpolation ${nomDuChamp} depuis les données soumises.<br/><b>Exemple :</b> <i>Nouveau message de ${prenom}</i>.
fmdb_emailAction.templateMessage=Corps du message
fmdb_emailAction.templateMessage.ui.tooltip=Corps de l'email. Supporte l'interpolation ${nomDuChamp} depuis les données soumises.<br/><b>Exemple :</b> <i>Nom : ${prenom} ${nom}\nMessage : ${message}</i>.

fmdb_sendDataAction=Action Envoi de données
fmdb_sendDataAction.ui.tooltip=Transfère les données complètes du formulaire à un endpoint tiers. La vérification CAPTCHA côté serveur est ignorée et le jeton est transmis à la cible.
fmdb_sendDataAction.targetUrl=URL cible
fmdb_sendDataAction.targetUrl.ui.tooltip=URL de l'endpoint tiers qui recevra les données du formulaire en application/x-www-form-urlencoded.<br/><b>Exemple :</b> <i>https://api.example.com/submit</i>.

fmdb_save2jcrAction=Action Sauvegarde JCR
fmdb_save2jcrAction.ui.tooltip=Sauvegarde les données soumises sous forme de n?uds enfants dans un chemin JCR désigné. Le CAPTCHA est vérifié côté serveur avant le stockage.
