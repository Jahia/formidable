fmdbmix_actionConfig=Formidable - Actions de formulaire
fmdbmix_formAction=Action de formulaire

fmdb_save2jcrAction=Sauvegarde JCR
fmdb_save2jcrAction.ui.tooltip=Sauvegarde les données soumises sous forme de nœuds enfants dans un chemin JCR désigné.

fmdb_forwardAction=Transfert de données
fmdb_forwardAction.ui.tooltip=Transfère les données complètes du formulaire (y compris les fichiers) vers un endpoint tiers (multipart/form-data). Les tokens CAPTCHA sont retirés avant le transfert.
fmdb_forwardAction.targetId=Cible de transfert
fmdb_forwardAction.targetId.ui.tooltip=La liste des cibles disponibles est gérée par un administrateur.

fmdb_emailAction=Notification email
fmdb_emailAction.ui.tooltip=Envoie une notification par email après une soumission réussie. L'objet et le corps supportent l'interpolation ${nomDuChamp}.
fmdb_emailAction.to=Destinataire (À)
fmdb_emailAction.to.ui.tooltip=Adresse email du destinataire.<br/><b>Exemple :</b> <i>contact@example.com</i>.
fmdb_emailAction.from=Expéditeur (De)
fmdb_emailAction.from.ui.tooltip=Adresse email affichée comme expéditeur.<br/><b>Exemple :</b> <i>no-reply@example.com</i>.
fmdb_emailAction.subject=Objet
fmdb_emailAction.subject.ui.tooltip=Objet de l'email. Supporte l'interpolation ${nomDuChamp}.<br/><b>Exemple :</b> <i>Nouveau message de ${prenom}</i>.
fmdb_emailAction.templateMessage=Corps du message
fmdb_emailAction.templateMessage.ui.tooltip=Corps de l'email. Supporte l'interpolation ${nomDuChamp}.<br/><b>Exemple :</b> <i>Nom : ${prenom} ${nom}\nMessage : ${message}</i>.

fmdbmix_captcha=CAPTCHA
fmdbmix_captcha.ui.tooltip=Active la protection CAPTCHA sur ce formulaire. Le widget est injecté automatiquement via la configuration globale (org.jahia.modules.formidable.captcha.cfg). Le jeton est toujours vérifié côté serveur.

