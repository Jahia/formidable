fmdbmix_actionConfig=Formidable - Actions de formulaire
fmdbmix_formAction=Action de formulaire

fmdb_save2jcrAction=Sauvegarde JCR
fmdb_save2jcrAction.ui.tooltip=Sauvegarde les données soumises sous forme de nœuds enfants dans un chemin JCR désigné.

fmdb_forwardAction=Transfert de données
fmdb_forwardAction.ui.tooltip=Transfère les données complètes du formulaire (y compris les fichiers) vers un endpoint tiers (multipart/form-data). Les tokens CAPTCHA sont retirés avant le transfert.
fmdb_forwardAction.targetId=Cible de transfert
fmdb_forwardAction.targetId.ui.tooltip=La liste des cibles disponibles est gérée par un administrateur.

fmdb_emailNotificationAction=Notification email
fmdb_emailNotificationAction.ui.tooltip=Envoie une notification par email après une soumission réussie. L'objet et le corps supportent l'interpolation ${nomDuChamp}.
fmdb_emailNotificationAction.to=Destinataire (À)
fmdb_emailNotificationAction.to.ui.tooltip=Adresse email du destinataire.<br/><b>Exemple :</b> <i>contact@example.com</i>.
fmdb_emailNotificationAction.from=Expéditeur (De)
fmdb_emailNotificationAction.from.ui.tooltip=Adresse email affichée comme expéditeur.<br/><b>Exemple :</b> <i>no-reply@example.com</i>.
fmdb_emailNotificationAction.subject=Objet
fmdb_emailNotificationAction.subject.ui.tooltip=Objet de l'email. Supporte l'interpolation ${nomDuChamp}.<br/><b>Exemple :</b> <i>Nouveau message de ${prenom}</i>.
fmdb_emailNotificationAction.templateMessage=Corps du message
fmdb_emailNotificationAction.templateMessage.ui.tooltip=Corps de l'email. Supporte l'interpolation ${nomDuChamp}.<br/><b>Exemple :</b> <i>Nom : ${prenom} ${nom}\nMessage : ${message}</i>.

fmdb_emailContentAction=Contenu du formulaire par email
fmdb_emailContentAction.ui.tooltip=Envoie par email le contenu soumis du formulaire. L'objet de l'email utilise le titre du formulaire soumis et peut inclure les fichiers uploadés en pièces jointes.
fmdb_emailContentAction.to=Destinataire (À)
fmdb_emailContentAction.to.ui.tooltip=Adresse email du destinataire.<br/><b>Exemple :</b> <i>contact@example.com</i>.
fmdb_emailContentAction.from=Expéditeur (De)
fmdb_emailContentAction.from.ui.tooltip=Adresse email affichée comme expéditeur.<br/><b>Exemple :</b> <i>no-reply@example.com</i>.
fmdb_emailContentAction.attachFiles=Joindre les fichiers uploadés
fmdb_emailContentAction.attachFiles.ui.tooltip=Joindre les fichiers uploadés validés à l'email lorsque le formulaire contient des champs fichier.
fmdb_emailContentAction.maxAttachmentSizeMb=Taille max des pièces jointes (Mo)
fmdb_emailContentAction.maxAttachmentSizeMb.ui.tooltip=Taille maximale autorisée par fichier joint pour cette action email.<br/><b>Note :</b> <i>La limite effective ne peut jamais dépasser la limite globale d'upload configurée sur le module.</i><br/><b>Exemple :</b> <i>5</i>.

fmdbmix_captcha=CAPTCHA
fmdbmix_captcha.ui.tooltip=Active la protection CAPTCHA sur ce formulaire. Le widget est injecté automatiquement via la configuration globale (org.jahia.modules.formidable.captcha.cfg). Le jeton est toujours vérifié côté serveur.
