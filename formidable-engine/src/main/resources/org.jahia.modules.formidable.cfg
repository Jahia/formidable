# default configuration - won't be overriden
# Formidable Configuration

# --- CAPTCHA ---
captcha_siteKey=
captcha_secretKey=
captcha_scriptUrl=
captcha_verifyUrl=

# --- FILE UPLOAD ---
upload_maxFileSizeBytes=10485760
upload_maxRequestSizeBytes=52428800
upload_maxFileCount=10
upload_allowedMimeTypes=image/jpeg,image/png,image/gif,image/webp,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/plain,text/csv

# --- FORWARD ACTION ---
# Each entry: id|Label|https://target-url
# The id is stored in JCR; the URL is resolved server-side and never exposed to contributors.
# Leave empty to disable all forward actions (fail-safe default).
# Example:
#   forward_targets=salesforce-prod|Salesforce Prod|https://api.salesforce.com/services/data/v59.0/sobjects/Lead/
forward_targets=

