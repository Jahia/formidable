# default configuration - won't be overriden
# Formidable Configuration

# --- CAPTCHA ---
captchaSiteKey=
captchaSecretKey=
captchaScriptUrl=
captchaVerifyUrl=

# --- FILE UPLOAD ---
uploadMaxFileSizeBytes=10485760
uploadMaxRequestSizeBytes=52428800
uploadMaxFileCount=10
uploadAllowedMimeTypes=image/jpeg,image/png,image/gif,image/webp,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/plain,text/csv

# --- FORWARD ACTION ---
# Each entry: id|Label|https://target-url
# The id is stored in JCR; the URL is resolved server-side and never exposed to contributors.
# Leave empty to disable all forward actions (fail-safe default).
# Example:
#   forwardTargets=salesforce-prod|Salesforce Prod|https://api.salesforce.com/services/data/v59.0/sobjects/Lead/
forwardTargets=
enableDevForwardTargets=false
# Development-only targets. Only plain HTTP on localhost or host.docker.internal is accepted.
# Ignored unless enableDevForwardTargets=true.
# Example:
#   devForwardTargets=local-api|Local API|http://localhost:3000/hook
#   docker-api|Docker API|http://host.docker.internal:8080/hook
devForwardTargets=
