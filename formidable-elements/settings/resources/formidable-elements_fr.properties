fmdb_radio.required.ui.tooltip=Rend ce champ obligatoire pour l'envoi du formulaire.<br/><b>Choix unique :</b> Le bouton radio doit être sélectionné.<br/><b>Choix multiples :</b> Un bouton radio du groupe doit être sélectionné.
fmdb_select=Liste déroulante
