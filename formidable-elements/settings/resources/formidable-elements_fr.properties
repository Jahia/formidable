fmdbmix_advancedTextareaSettings.readonly.ui.tooltip=Rendre la zone en lecture seule tout en restant focusable.<br/><b>Utilisation :</b> <i>Afficher un contenu sélectionnable/copier-collable non modifiable</i>.<br/><b>Note :</b> <i>Les champs en lecture seule sont envoyés, contrairement aux désactivés</i>.
fmdbmix_advancedTextareaSettings.autocomplete=Autocomplétion
fmdbmix_advancedTextareaSettings.autocomplete.ui.tooltip=Activer l'autocomplétion du navigateur.<br/><b>Utilisation :</b><br/>- <i>'on'</i> : Active l'autocomplétion du navigateur (par défaut)<br/>- <i>'off'</i> : Désactive l'autocomplétion<br/>- <i>Valeur libre</i> : N'importe quel token HTML5 autocomplete (ex : 'email', 'name', 'username', 'tel', 'street-address', 'postal-code', 'country').
fmdbmix_advancedTextareaSettings.spellcheck=Vérification orthographique
fmdbmix_advancedTextareaSettings.spellcheck.ui.tooltip=Activer la correction orthographique.<br/><b>Utilisation :</b> <i>Aide à repérer/corriger les fautes</i>.<br/><b>Note :</b> <i>Le comportement dépend des réglages utilisateur</i>.
fmdbmix_advancedTextareaSettings.autofocus=Focus automatique
fmdbmix_advancedTextareaSettings.autofocus.ui.tooltip=Focaliser automatiquement au chargement.<br/><b>Utilisation :</b> <i>Améliore l'accessibilité</i>.<br/><b>Note :</b> <i>Un seul élément par page</i>.
fmdbmix_advancedTextareaSettings.disabled=Désactivé
fmdbmix_advancedTextareaSettings.disabled.ui.tooltip=Désactiver la zone pour empêcher l'interaction.<br/><b>Utilisation :</b> <i>Rendre non modifiable et exclure de l'envoi</i>.<br/><b>Note :</b> <i>Les champs désactivés ne sont pas soumis</i>.
fmdbmix_advancedTextareaSettings.cols=Colonnes
fmdbmix_advancedTextareaSettings.cols.ui.tooltip=Largeur en nombre moyen de caractères.<br/><b>Utilisation :</b> <i>Contrôle la largeur initiale</i>.<br/><b>Note :</b> <i>Préférer la largeur CSS dans les designs modernes</i>.
fmdbmix_advancedTextareaSettings.wrap=Renvoi à la ligne
fmdbmix_advancedTextareaSettings.wrap.ui.tooltip=Gestion du renvoi lors de la soumission.<br/><b>Soft :</b> <i>Retour visuel uniquement</i>.<br/><b>Hard :</b> <i>Retours inclus dans les données</i>.<br/><b>Off :</b> <i>Aucun renvoi</i>.
fmdbmix_advancedTextareaSettings.wrap.soft=Soft
fmdbmix_advancedTextareaSettings.wrap.hard=Hard
fmdbmix_advancedTextareaSettings.wrap.off=Off
fmdbmix_advancedTextareaSettings.form=Formulaire associé
fmdbmix_advancedTextareaSettings.form.ui.tooltip=ID du formulaire auquel appartient cette zone.<br/><b>Utilisation :</b> <i>Associer une zone située hors de l'élément form</i>.<br/><b>Note :</b> <i>Permet d'être en dehors tout en en faisant partie</i>.
fmdbmix_advancedTextareaSettings.dirname=Soumettre la direction du texte
fmdbmix_advancedTextareaSettings.dirname.ui.tooltip=Lorsqu'activé, le navigateur soumet la direction du texte détectée (ltr/rtl) avec le formulaire.<br/><b>Utilisation :</b> <i>Utile pour les formulaires multilingues où la direction peut varier</i>.<br/><b>Note :</b> <i>Le champ soumis sera nommé {nomDuChamp}.dir avec la valeur "ltr" ou "rtl"</i>.
fmdbmix_advancedInputTextSettings=Paramètres avancés
fmdbmix_advancedInputTextSettings.ui.tooltip=Options avancées pour le comportement/accessibilité du champ texte.<br/><b>Utilisation :</b> <i>Affiner pour des cas spécifiques</i>.
fmdbmix_advancedInputTextSettings.readonly=Lecture seule
fmdbmix_advancedInputTextSettings.readonly.ui.tooltip=Rendre le champ en lecture seule tout en restant focusable.<br/><b>Utilisation :</b> <i>Afficher du contenu sélectionnable non modifiable</i>.<br/><b>Note :</b> <i>Inclus dans l'envoi, contrairement aux champs désactivés</i>.
fmdbmix_advancedInputTextSettings.autofocus=Focus automatique
fmdbmix_advancedInputTextSettings.autofocus.ui.tooltip=Focaliser automatiquement au chargement de la page.<br/><b>Utilisation :</b> <i>Améliore l'accessibilité</i>.<br/><b>Note :</b> <i>Un seul élément par page</i>.
fmdbmix_advancedInputTextSettings.disabled=Désactivé
fmdbmix_advancedInputTextSettings.disabled.ui.tooltip=Désactiver le champ pour empêcher l'interaction.<br/><b>Utilisation :</b> <i>Lecture seule et exclusion de la soumission</i>.<br/><b>Note :</b> <i>Les champs désactivés ne sont pas soumis</i>.
fmdbmix_advancedInputTextSettings.form=Formulaire associé
fmdbmix_advancedInputTextSettings.form.ui.tooltip=ID du formulaire auquel appartient ce champ.<br/><b>Utilisation :</b> <i>Associer un champ situé ailleurs sur la page</i>.<br/><b>Note :</b> <i>Permet d'être en dehors de l'élément form</i>.
fmdbmix_advancedInputTextSettings.dirname=Soumettre la direction du texte
fmdbmix_advancedInputTextSettings.dirname.ui.tooltip=Lorsqu'activé, le navigateur soumet la direction du texte détectée (ltr/rtl) avec le formulaire.<br/><b>Utilisation :</b> <i>Utile pour les formulaires multilingues où la direction peut varier</i>.<br/><b>Note :</b> <i>Le champ soumis sera nommé {nomDuChamp}.dir avec la valeur "ltr" ou "rtl"</i>.
fmdbmix_advancedInputTextSettings.spellcheck=Vérification orthographique
fmdbmix_advancedInputTextSettings.spellcheck.ui.tooltip=Activer la correction orthographique pour ce champ.<br/><b>Utilisation :</b> <i>Aider à repérer/corriger les fautes</i>.<br/><b>Note :</b> <i>Varie selon les réglages du navigateur</i>.
fmdbmix_advancedInputTextSettings.pattern=Validation par motif
fmdbmix_advancedInputTextSettings.pattern.ui.tooltip=Expression régulière pour la validation.<br/><b>Utilisation :</b> <i>Définir des règles personnalisées au-delà du texte standard</i>.<br/><b>Exemple :</b> <i>[A-Z]{3}-[0-9]{3} pour le format ABC-123</i>.<br/><b>Note :</b> <i>Fonctionne en plus d'autres attributs (minLength, etc.)</i>.
fmdbmix_advancedInputTextSettings.size=Largeur (caractères)
fmdbmix_advancedInputTextSettings.size.ui.tooltip=Largeur visuelle en nombre moyen de caractères.<br/><b>Utilisation :</b> <i>Contrôle la largeur du champ</i>.<br/><b>Recommandation :</b> <i>Privilégier des classes CSS ou un style personnalisé</i>.
fmdbmix_advancedInputTextSettings.title=Titre (info-bulle)
fmdbmix_advancedInputTextSettings.title.ui.tooltip=Texte d'aide affiché au survol ou au focus.<br/><b>Utilisation :</b> <i>Fournir du contexte ou des indices de validation</i>.<br/><b>Exemple :</b> <i>Entrez votre identifiant (3-20 caractères)</i>.<br/><b>Accessibilité :</b> <i>Aide à comprendre les exigences</i>.
fmdbmix_advancedInputTextSettings.autocomplete=Autocomplétion
fmdbmix_advancedInputTextSettings.autocomplete.ui.tooltip=Activer l'autocomplétion du navigateur.<br/><b>Utilisation :</b><br/>- <i>'on'</i> : Active l'autocomplétion du navigateur (par défaut)<br/>- <i>'off'</i> : Désactive l'autocomplétion<br/>- <i>Valeur libre</i> : N'importe quel token HTML5 autocomplete (ex : 'name', 'username', 'tel', 'street-address').
label.submitBtn=Envoyer
label.resetBtn=Réinitialiser
label.newFormBtn=Nouveau formulaire
label.tryAgainBtn=Réessayer
label.previousBtn=Précédent
label.nextBtn=Suivant
fmdb_step=Étape
fmdb_step.ui.tooltip=Une étape de formulaire regroupant des éléments dans un formulaire multi-étapes.<br/><b>Utilisation :</b> <i>Ajoutez plusieurs étapes à un formulaire pour créer une expérience de type assistant</i>.<br/><b>Note :</b> <i>Les étapes ne peuvent être qu'enfants directs d'un formulaire, pas imbriquées dans d'autres étapes</i>.
fmdb_step.label=Libellé de navigation
fmdb_step.label.ui.tooltip=Libellé court affiché dans la barre de navigation des étapes à la place du titre.<br/><b>Exemple :</b> <i>Titre : "Informations personnelles de l'utilisateur" -> Libellé : "Infos personnelles"</i>.<br/><b>Si vide, le titre est utilisé comme valeur de repli</b>.
fmdb_step.intro=Texte d'introduction
fmdb_step.intro.ui.tooltip=Texte d'introduction optionnel affiché dans l'étape.<br/><b>Lorsque la navigation est activée :</b> <i>Affiché sous la barre de navigation (le titre y est déjà visible)</i>.<br/><b>Lorsque la navigation est désactivée :</b> <i>Affiché sous le titre de l'étape</i>.
fmdbmix_multiStep=Multi-étapes
fmdbmix_multiStep.ui.tooltip=Configurer le comportement multi-étapes du formulaire.
fmdbmix_multiStep.showStepsNav=Afficher la navigation des étapes
fmdbmix_multiStep.showStepsNav.ui.tooltip=Affiche la barre de navigation des étapes en haut du formulaire.<br/><b>Activé :</b> <i>Les titres des étapes apparaissent uniquement dans la barre de navigation, pas répétés dans chaque étape</i>.<br/><b>Désactivé :</b> <i>Le titre et la description sont affichés directement dans chaque étape</i>.
fmdbmix_captcha=CAPTCHA
fmdbmix_captcha.ui.tooltip=Active la protection CAPTCHA sur ce formulaire. La configuration du widget est lue depuis le fichier global org.jahia.modules.formidable.captcha.cfg. Le jeton est toujours vérifié côté serveur.
