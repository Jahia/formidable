fmdb_checkbox.required.ui.tooltip=Rend ce champ obligatoire pour l'envoi du formulaire.<br/><b>Choix unique :</b> La case doit être cochée.<br/><b>Choix multiples :</b> Au moins une case doit être cochée.
fmdb_radio=Champ boutons radio
