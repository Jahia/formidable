fmdb_inputText.mask.ui.tooltip=Modèle de masque qui guide le format de saisie.<br/><b>Utilisation :</b> <i>9 pour les chiffres, A pour les lettres, * pour alphanumérique</i>.<br/><b>Exemple :</b> <i>(999) 999-9999, 99/99/9999, AAA-999</i>.
fmdb_inputText.list=Liste de valeurs suggérées
fmdb_inputText.list.ui.tooltip=Liste de valeurs prédéfinies pour les suggestions d'autocomplétion.<br/><b>Utilisation :</b> <i>Propose des options dans un menu déroulant</i>.
fmdb_inputText.required=Obligatoire
fmdb_inputText.required.ui.tooltip=Rend ce champ obligatoire pour l'envoi du formulaire.<br/><b>Validation :</b> Empêche l'envoi si le champ est vide.
fmdb_inputDate=Champ date
