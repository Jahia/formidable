fmdbmix_component=Formidable - Éléments de formulaire
fmdb_actionList=Actions
fmdb_actionList.ui.tooltip=Liste des actions exécutées à la soumission du formulaire, dans l'ordre défini.
fmdb_inputText=Champ de texte
fmdb_inputText.ui.tooltip=Un champ de saisie sur une seule ligne.
fmdb_inputText.placeholder=Texte indicatif
