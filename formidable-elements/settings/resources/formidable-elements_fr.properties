fmdb_inputDate.required=Obligatoire
fmdb_inputDate.required.ui.tooltip=Rend ce champ date obligatoire pour l'envoi du formulaire.<br/><b>Validation :</b> Empêche l'envoi si le champ est vide.
fmdb_checkbox=Champ cases à cocher
