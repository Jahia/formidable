fmdb_radio.choices=Choix
fmdb_radio.choices.ui.tooltip=Liste des choix sélectionnables.<br/><b>Chaque ligne contient :</b><br/>- <i>Case à cocher</i> : si cochée, le choix est sélectionné par défaut<br/>- <i>Premier champ</i> : valeur envoyée au serveur<br/>- <i>Second champ</i> : libellé affiché à l'utilisateur
