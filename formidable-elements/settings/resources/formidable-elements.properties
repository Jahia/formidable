fmdb_inputText=Input Text
fmdb_inputText.ui.tooltip=A single line text input field.
fmdb_inputText.placeholder=Placeholder
fmdb_inputText.placeholder.ui.tooltip=Text displayed inside the input field when empty.<br/><b>Usage:</b> <i>Provides hints or examples to guide user input</i>.
fmdb_inputText.defaultValue=Default value
fmdb_inputText.defaultValue.ui.tooltip=Pre-filled value that appears when the input is first rendered.<br/><b>Usage:</b> <i>Set initial content or suggested values</i>.
fmdb_inputText.minLength=Minimum length
fmdb_inputText.minLength.ui.tooltip=Minimum number of characters required in this input field.<br/><b>Validation:</b> Prevents form submission with values shorter than specified.
fmdb_inputText.maxLength=Maximum length
fmdb_inputText.maxLength.ui.tooltip=The maximum number of characters allowed in this input field.<br/><b>Validation:</b> Prevents users from entering more characters than specified.<br/><b>Note:</b> <i>Must be greater than minLength if both are set</i>.
fmdb_inputText.mask=Input mask
fmdb_inputText.mask.ui.tooltip=Input mask pattern that guides user input format.<br/><b>Usage:</b> <i>9 for digits, A for letters, * for alphanumeric</i>.<br/><b>Example:</b> <i>(999) 999-9999, 99/99/9999, AAA-999</i>.
fmdb_inputText.list=Suggested values list
fmdb_inputText.list.ui.tooltip=List of predefined values for autocomplete suggestions.<br/><b>Usage:</b> <i>Provides suggested options in a dropdown menu</i>.
fmdb_inputText.required=Required
fmdb_inputText.required.ui.tooltip=Makes this input field mandatory for form submission.<br/><b>Validation:</b> Prevents form submission when field is empty.
fmdb_inputDate=Input Date
fmdb_inputDate.ui.tooltip=A date input field with native browser date picker.
fmdb_inputDate.defaultValue=Default value
fmdb_inputDate.defaultValue.ui.tooltip=Pre-filled date value that appears when the input is first rendered.<br/><b>Usage:</b> <i>Set initial date or suggested values using the date picker</i>.
fmdb_inputDate.min=Minimum date
fmdb_inputDate.min.ui.tooltip=The earliest date that can be selected.<br/><b>Validation:</b> Prevents selection of dates before this value using the date picker.
fmdb_inputDate.max=Maximum date
fmdb_inputDate.max.ui.tooltip=The latest date that can be selected.<br/><b>Validation:</b> Prevents selection of dates after this value.<br/><b>Note:</b> <i>Must be greater than min if both are set</i>.
fmdb_inputDate.step=Step
fmdb_inputDate.step.ui.tooltip=Number of days between valid dates.<br/><b>Usage:</b> <i>1 for daily, 7 for weekly intervals</i>.<br/><b>Note:</b> <i>Default is 1 day</i>.
fmdb_inputDate.required=Required
fmdb_inputDate.required.ui.tooltip=Makes this date field mandatory for form submission.<br/><b>Validation:</b> Prevents form submission when field is empty.
fmdb_checkbox=Input Checkbox
fmdb_checkbox.ui.tooltip=A checkbox input field. Renders a single checkbox when one choice is defined, or a checkbox group when multiple choices are available.
fmdb_checkbox.choices=Choice(s)
fmdb_checkbox.choices.ui.tooltip=List of selectable choices.<br/><b>Each row contains:</b><br/>- <i>Checkbox</i>: if checked, the choice is selected by default<br/>- <i>First field</i>: value sent to server<br/>- <i>Second field</i>: label displayed to user
fmdb_checkbox.required=Required
fmdb_checkbox.required.ui.tooltip=Makes this field mandatory for form submission.<br/><b>Single choice:</b> The checkbox must be checked.<br/><b>Multiple choices:</b> At least one checkbox must be checked.
fmdb_radio=Input Radio
fmdb_radio.ui.tooltip=A radio input field. Renders a single radio button when one choice is defined, or a radio group when multiple choices are available.
fmdb_radio.choices=Choice(s)
fmdb_radio.choices.ui.tooltip=List of selectable choices.<br/><b>Each row contains:</b><br/>- <i>Checkbox</i>: if checked, the choice is selected by default<br/>- <i>First field</i>: value sent to server<br/>- <i>Second field</i>: label displayed to user
fmdb_radio.required=Required
fmdb_radio.required.ui.tooltip=Makes this field mandatory for form submission.<br/><b>Single choice:</b> The radio button must be selected.<br/><b>Multiple choices:</b> One radio button in the group must be selected.
fmdb_select=Select
fmdb_select.ui.tooltip=A dropdown selection field with predefined options.
fmdb_select.options=Options
fmdb_select.options.ui.tooltip=List of selectable options.<br/><b>Each row contains:</b><br/>- <i>Checkbox</i>: if checked, the option is selected by default<br/>- <i>First field</i>: value sent to server<br/>- <i>Second field</i>: label displayed to user
fmdb_select.multiple=Multiple selection
fmdb_select.multiple.ui.tooltip=Allow users to select multiple options.<br/><b>Usage:</b> <i>Hold Ctrl/Cmd to select multiple items</i>.<br/><b>Note:</b> <i>Changes form data structure to array</i>.
fmdb_select.size=Visible options
fmdb_select.size.ui.tooltip=Number of options visible at once.<br/><b>Usage:</b> <i>Shows scrollable list instead of dropdown when > 1</i>.<br/><b>Note:</b> <i>Only affects display, not functionality</i>.
fmdb_select.autofocus=Auto focus
fmdb_select.autofocus.ui.tooltip=Automatically focus this select when page loads.<br/><b>Usage:</b> <i>Improves accessibility and user experience</i>.<br/><b>Note:</b> <i>Only one element per page should have autofocus</i>.
fmdb_select.required=Required
fmdb_select.required.ui.tooltip=Makes this select field mandatory for form submission.<br/><b>Validation:</b> Prevents form submission when no option is selected.
fmdb_select.disabled=Disabled
fmdb_select.disabled.ui.tooltip=Disable the select preventing user interaction.<br/><b>Usage:</b> <i>Make field read-only and exclude from form submission</i>.<br/><b>Note:</b> <i>Disabled fields are not submitted with form data</i>.
fmdb_fieldset=Fieldset
fmdb_fieldset.ui.tooltip=A fieldset element that groups related form elements together.<br/><b>Usage:</b> <i>Organizes form elements semantically and visually</i>.<br/><b>Note:</b> <i>Can contain any form elements as children</i>.
fmdb_richText=Rich Text
fmdb_richText.ui.tooltip=A rich text content block embeddable in a form.<br/><b>Usage:</b> <i>Add formatted text, instructions or HTML content within a form</i>.
fmdb_richText.text=Content
fmdb_richText.text.ui.tooltip=Rich text content displayed inside the form.<br/><b>Usage:</b> <i>Supports HTML formatting, links and media</i>.
fmdb_inputFile=Input File
fmdb_inputFile.ui.tooltip=A file upload input field allowing users to select files from their device.
fmdb_inputFile.accept=Accept
fmdb_inputFile.accept.ui.tooltip=Specify file types that the server accepts.<br/><b>Usage:</b> <i>Comma-separated list of file extensions or MIME types</i>.<br/><b>Example:</b> <i>.jpg, .png, .pdf, image/*, application/pdf</i>.
fmdb_inputFile.multiple=Multiple files
fmdb_inputFile.multiple.ui.tooltip=Allow users to select multiple files at once.<br/><b>Usage:</b> <i>Enables multi-file selection in file picker</i>.<br/><b>Note:</b> <i>Changes form data structure to array</i>.
fmdb_inputFile.required=Required
fmdb_inputFile.required.ui.tooltip=Makes this file input mandatory for form submission.<br/><b>Validation:</b> At least one file must be selected to submit the form.
fmdb_inputEmail=Input Email
fmdb_inputEmail.ui.tooltip=An email input field with native validation and mobile-optimized keyboard.
fmdb_inputEmail.placeholder=Placeholder
fmdb_inputEmail.placeholder.ui.tooltip=Text displayed inside the email input field when empty.<br/><b>Usage:</b> <i>Provides hints or examples to guide email input</i>.<br/><b>Example:</b> <i>user@example.com</i>.<br/><b>Multiple mode:</b> <i>user1@example.com, user2@example.com</i>.
fmdb_inputEmail.defaultValue=Default value
fmdb_inputEmail.defaultValue.ui.tooltip=Pre-filled email value that appears when the input is first rendered.<br/><b>Usage:</b> <i>Set initial email content or suggested values</i>.
fmdb_inputEmail.minLength=Minimum length
fmdb_inputEmail.minLength.ui.tooltip=Minimum number of characters required in this email field.<br/><b>Validation:</b> Prevents form submission with email addresses shorter than specified.
fmdb_inputEmail.maxLength=Maximum length
fmdb_inputEmail.maxLength.ui.tooltip=The maximum number of characters allowed in this email field.<br/><b>Validation:</b> Prevents users from entering more characters than specified.<br/><b>Note:</b> <i>Must be greater than minLength if both are set</i>.
fmdb_inputEmail.multiple=Multiple emails
fmdb_inputEmail.multiple.ui.tooltip=Allow users to enter multiple email addresses separated by commas.<br/><b>Usage:</b> <i>Enables multiple email selection for recipients or notifications</i>.<br/><b>Example:</b> <i>user1@example.com, user2@example.com</i>.
fmdb_inputEmail.autocomplete=Autocomplete
fmdb_inputEmail.autocomplete.ui.tooltip=Enable browser autocomplete for this email field.<br/><b>Usage:</b><br/>- <i>'on'</i>: Enable browser autocomplete (default)<br/>- <i>'off'</i>: Disable autocomplete<br/>- <i>Custom value</i>: Any HTML5 autocomplete token (e.g., 'email', 'customer-email').
fmdb_inputEmail.list=Suggested email list
fmdb_inputEmail.list.ui.tooltip=List of predefined email addresses for autocomplete suggestions.<br/><b>Usage:</b> <i>Provides suggested email options in a dropdown menu</i>.<br/><b>Example:</b> <i>admin@company.com, support@company.com</i>.
fmdb_inputEmail.pattern=Email pattern
fmdb_inputEmail.pattern.ui.tooltip=Custom regex pattern for email validation beyond standard format.<br/><b>Usage:</b> <i>Restrict email to specific domains or formats</i>.<br/><b>Example:</b> <i>.*@company\.com for company emails only</i>.<br/><b>Note:</b> <i>Works in addition to native email validation</i>.
fmdb_inputEmail.required=Required
fmdb_inputEmail.required.ui.tooltip=Makes this email field mandatory for form submission.<br/><b>Validation:</b> Prevents form submission when field is empty and validates email format.
fmdb_inputColor=Input Color
fmdb_inputColor.ui.tooltip=A color picker input field that opens a native color selection interface.
fmdb_inputColor.defaultValue=Default color value
fmdb_inputColor.defaultValue.ui.tooltip=Default color value format depends on colorspace.<br/><b>Limited-sRGB:</b> <i>Hex format (#RRGGBB or #RRGGBBAA)</i>.<br/><b>Display-P3:</b> <i>Hex or CSS color(display-p3 r g b) format</i>.<br/><b>Example:</b> <i>#FF0000, color(display-p3 1 0 0)</i>.
fmdb_inputColor.required=Required
fmdb_inputColor.required.ui.tooltip=Makes this color field mandatory for form submission.<br/><b>Validation:</b> Prevents form submission when field is empty.<br/><b>Note:</b> <i>Color input always has a value, so this mainly affects form semantics</i>.
#fmdb_inputColorAdvancedSettings=Advanced Color Settings
#fmdb_inputColorAdvancedSettings.ui.tooltip=Advanced settings for color picker functionality and appearance.<br/><b>Browser Support:</b> <i>These advanced options are not supported by all browsers - primarily available in Safari and iOS browsers</i>.<br/><b>Note:</b> <i>Falls back to standard color picker behavior on unsupported browsers</i>.
#fmdb_inputColorAdvancedSettings.alpha=Alpha channel
#fmdb_inputColorAdvancedSettings.alpha.ui.tooltip=Enable transparency/opacity selection in the color picker.<br/><b>Usage:</b> <i>Allows users to select RGBA colors with transparency</i>.<br/><b>Note:</b> <i>Color value will include alpha as 8-digit hex (#RRGGBBAA)</i>.
#fmdb_inputColorAdvancedSettings.colorspace=Color space
#fmdb_inputColorAdvancedSettings.colorspace.ui.tooltip=Color space for color selection.<br/><b>Options:</b> <i>limited-srgb (default), display-p3</i>.<br/><b>Usage:</b> <i>Defines the color gamut available for selection</i>.<br/><b>Note:</b> <i>Falls back to limited-srgb on unsupported browsers</i>.
fmdb_inputDatetimeLocal=Input Datetime-Local
fmdb_inputDatetimeLocal.ui.tooltip=A datetime-local input field with native browser date and time picker.
fmdb_inputDatetimeLocal.defaultValue=Default value
fmdb_inputDatetimeLocal.defaultValue.ui.tooltip=Pre-filled datetime value that appears when the input is first rendered.<br/><b>Usage:</b> <i>Set initial datetime or suggested values using the datetime picker</i>.
fmdb_inputDatetimeLocal.min=Minimum datetime
fmdb_inputDatetimeLocal.min.ui.tooltip=The earliest datetime that can be selected.<br/><b>Validation:</b> Prevents selection of datetimes before this value using the datetime picker.
fmdb_inputDatetimeLocal.max=Maximum datetime
fmdb_inputDatetimeLocal.max.ui.tooltip=The latest datetime that can be selected.<br/><b>Validation:</b> Prevents selection of datetimes after this value.<br/><b>Note:</b> <i>Must be greater than min if both are set</i>.
fmdb_inputDatetimeLocal.step=Step
fmdb_inputDatetimeLocal.step.ui.tooltip=Number of seconds between valid datetimes.<br/><b>Usage:</b> <i>60 for minute intervals, 3600 for hour intervals</i>.<br/><b>Note:</b> <i>Default is 60 seconds (1 minute)</i>.
fmdb_inputDatetimeLocal.required=Required
fmdb_inputDatetimeLocal.required.ui.tooltip=Makes this datetime field mandatory for form submission.<br/><b>Validation:</b> Prevents form submission when field is empty.
fmdb_inputHidden=Input Hidden
fmdb_inputHidden.ui.tooltip=A hidden input field that stores data invisibly in the form.
fmdb_inputHidden.value=Value
fmdb_inputHidden.value.ui.tooltip=The data value stored in this hidden field.<br/><b>Usage:</b> <i>Set static data that needs to be submitted with the form</i>.<br/><b>Security:</b> <i>Remember that hidden fields can be modified by users through browser dev tools</i>.
fmdb_inputButton=Input Button
fmdb_inputButton.ui.tooltip=A button element for form actions and user interactions.
fmdb_inputButton.buttonType=Button type
fmdb_inputButton.buttonType.ui.tooltip=Defines the button's behavior within forms.<br/><b>Button:</b> <i>Default behavior, no form action</i>.<br/><b>Submit:</b> <i>Submits the form when clicked</i>.<br/><b>Reset:</b> <i>Resets all form fields to default values</i>.
fmdb_inputButton.buttonType.button=Button
fmdb_inputButton.buttonType.submit=Submit
fmdb_inputButton.buttonType.reset=Reset
fmdb_inputButton.variant=Visual style
fmdb_inputButton.variant.ui.tooltip=Controls the button's visual appearance and emphasis level.<br/><b>Primary:</b> <i>Main action button (highlighted)</i>.<br/><b>Secondary:</b> <i>Secondary action button (neutral)</i>.<br/><b>Danger:</b> <i>Destructive action button (warning color)</i>.
fmdb_inputButton.variant.primary=Primary
fmdb_inputButton.variant.secondary=Secondary
fmdb_inputButton.variant.danger=Danger
fmdb_form=Form
fmdb_form.ui.tooltip=A form container that groups form elements together and handles form submission.<br/><b>Usage:</b> <i>Main container for all form elements and defines form behavior</i>.
fmdb_form.intro=Introduction text
fmdb_form.intro.ui.tooltip=Rich text introduction displayed at the top of the form.<br/><b>Usage:</b> <i>Provide instructions, context, or welcome message to users</i>.<br/><b>Note:</b> <i>Supports HTML formatting and can include form title, links or emphasis</i>.
fmdbmix_responses=Response Messages
fmdbmix_responses.ui.tooltip=Configure success and error messages displayed after form submission.
fmdbmix_responses.submissionMessage=Submission message
fmdbmix_responses.submissionMessage.ui.tooltip=Message displayed when form is successfully submitted.<br/><b>Variables:</b> <i>Use ${fieldName} to insert form field values</i>.<br/><b>Example:</b> <i>Thank you ${firstname}, your message has been sent!</i>.<br/><b>Note:</b> <i>Field names match the system-name of form elements. Empty fields show as blank in message. Use required fields for guaranteed values</i>.
fmdbmix_responses.errorMessage=Error message
fmdbmix_responses.errorMessage.ui.tooltip=Message displayed when form submission fails or encounters an error.<br/><b>Variables:</b> <i>Use ${fieldName} to insert form field values</i>.<br/><b>Example:</b> <i>Sorry ${firstname}, there was an error processing your request</i>.<br/><b>Note:</b> <i>Field names match the system-name of form elements. Empty fields show as blank in message. Use required fields for guaranteed values</i>.
fmdbmix_buttons=Form Buttons
fmdbmix_buttons.ui.tooltip=Configure the display and labels of form action buttons.<br/><b>Usage:</b> <i>Control which buttons are shown to users and customize their labels</i>.
fmdbmix_buttons.submitBtnLabel=Submit button label
fmdbmix_buttons.submitBtnLabel.ui.tooltip=Custom label for the submit button.<br/><b>Example:</b> <i>Send, Register, Continue</i>.<br/><b>If empty, default value: Submit</b>.
fmdbmix_buttons.showResetBtn=Show reset button
fmdbmix_buttons.resetBtnLabel=Reset button label
fmdbmix_buttons.resetBtnLabel.ui.tooltip=Custom label for the reset button.<br/><b>Example:</b> <i>Clear, Start Over</i>.<br/><b>If empty, default value: Reset</b>.
fmdbmix_buttons.showNewFormBtn=Show new form button
fmdbmix_buttons.newFormBtnLabel=New form button label
fmdbmix_buttons.newFormBtnLabel.ui.tooltip=Custom label for the new form button.<br/><b>Example:</b> <i>Submit Another, New Entry</i>.<br/><b>If empty, default value: New Form</b>.
fmdbmix_buttons.showTryAgainBtn=Show try again button
fmdbmix_buttons.tryAgainBtnLabel=Try again button label
fmdbmix_buttons.tryAgainBtnLabel.ui.tooltip=Custom label for the try again button shown on form errors.<br/><b>Example:</b> <i>Retry, Try Again, Fix and Resubmit</i>.<br/><b>If empty, default value: Try Again</b>.
fmdbmix_actions=Form Actions
fmdbmix_actions.ui.tooltip=Configure form submission target and custom actions.<br/><b>Usage:</b> <i>Define custom form submission endpoints and future custom actions like email sending</i>.
fmdbmix_actions.customTarget=Custom target
fmdbmix_actions.customTarget.ui.tooltip=Custom target for form submission.<br/><b>Usage:</b> <i>Override default form action URL</i>.<br/><b>Example:</b> <i>https://api.example.com/contact, https://external-service.com/submit</i>.
fmdbmix_style=Style
fmdbmix_style.ui.tooltip=Configure custom CSS styling for the form.
fmdbmix_style.css=Custom CSS
fmdbmix_style.css.ui.tooltip=Custom CSS code to style the form elements.<br/><b>Usage:</b> <i>Add custom styles to override default form appearance</i>.<br/><b>Example:</b> <i>.form-container { background: #f5f5f5; }</i>.<br/><b>Note:</b> <i>CSS will be applied to the form and its children</i>.
fmdb_textarea=Textarea
fmdb_textarea.ui.tooltip=A multi-line text input field for longer text content.
fmdb_textarea.placeholder=Placeholder
fmdb_textarea.placeholder.ui.tooltip=Text displayed inside the textarea when empty.<br/><b>Usage:</b> <i>Provides hints or examples to guide user input for longer text</i>.
fmdb_textarea.defaultValue=Default value
fmdb_textarea.defaultValue.ui.tooltip=Pre-filled text content that appears when the textarea is first rendered.<br/><b>Usage:</b> <i>Set initial content or example text</i>.
fmdb_textarea.minLength=Minimum length
fmdb_textarea.minLength.ui.tooltip=Minimum number of characters required in this textarea.<br/><b>Validation:</b> Prevents form submission with content shorter than specified.
fmdb_textarea.maxLength=Maximum length
fmdb_textarea.maxLength.ui.tooltip=The maximum number of characters allowed in this textarea.<br/><b>Validation:</b> Prevents users from entering more characters than specified.<br/><b>Note:</b> <i>Must be greater than minLength if both are set</i>.
fmdb_textarea.rows=Rows
fmdb_textarea.rows.ui.tooltip=Number of visible text lines in the textarea.<br/><b>Usage:</b> <i>Controls the initial height of the textarea</i>.<br/><b>Note:</b> <i>Default is 4 rows if not specified</i>.
fmdb_textarea.resize=Resize behavior
fmdb_textarea.resize.ui.tooltip=Controls how users can resize the textarea.<br/><b>Vertical:</b> <i>Can resize height only</i>.<br/><b>Horizontal:</b> <i>Can resize width only</i>.<br/><b>Both:</b> <i>Can resize both dimensions</i>.<br/><b>None:</b> <i>Cannot be resized</i>.
fmdb_textarea.resize.none=None
fmdb_textarea.resize.both=Both
fmdb_textarea.resize.horizontal=Horizontal
fmdb_textarea.resize.vertical=Vertical
fmdb_textarea.required=Required
fmdb_textarea.required.ui.tooltip=Makes this textarea field mandatory for form submission.<br/><b>Validation:</b> Prevents form submission when field is empty.
fmdbmix_advancedTextareaSettings=Advanced Settings
fmdbmix_advancedTextareaSettings.ui.tooltip=Advanced configuration options for textarea behavior and accessibility.<br/><b>Usage:</b> <i>Fine-tune textarea functionality for specific use cases</i>.
fmdbmix_advancedTextareaSettings.readonly=Read-only
fmdbmix_advancedTextareaSettings.readonly.ui.tooltip=Make the textarea read-only but still focusable.<br/><b>Usage:</b> <i>Display content that can be selected/copied but not modified</i>.<br/><b>Note:</b> <i>Read-only fields are included in form submission unlike disabled fields</i>.
fmdbmix_advancedTextareaSettings.autocomplete=Autocomplete
fmdbmix_advancedTextareaSettings.autocomplete.ui.tooltip=Enable browser autocomplete for this textarea field.<br/><b>Usage:</b><br/>- <i>'on'</i>: Enable browser autocomplete (default)<br/>- <i>'off'</i>: Disable autocomplete<br/>- <i>Custom value</i>: Any HTML5 autocomplete token (e.g., 'user-comments').
fmdbmix_advancedTextareaSettings.spellcheck=Spell check
fmdbmix_advancedTextareaSettings.spellcheck.ui.tooltip=Enable browser spell checking for this textarea.<br/><b>Usage:</b> <i>Helps users identify and correct spelling errors</i>.<br/><b>Note:</b> <i>Browser behavior may vary based on user settings</i>.
fmdbmix_advancedTextareaSettings.autofocus=Auto focus
fmdbmix_advancedTextareaSettings.autofocus.ui.tooltip=Automatically focus this textarea when page loads.<br/><b>Usage:</b> <i>Improves accessibility and user experience</i>.<br/><b>Note:</b> <i>Only one element per page should have autofocus</i>.
fmdbmix_advancedTextareaSettings.disabled=Disabled
fmdbmix_advancedTextareaSettings.disabled.ui.tooltip=Disable the textarea preventing user interaction.<br/><b>Usage:</b> <i>Make field read-only and exclude from form submission</i>.<br/><b>Note:</b> <i>Disabled fields are not submitted with form data</i>.
fmdbmix_advancedTextareaSettings.cols=Columns
fmdbmix_advancedTextareaSettings.cols.ui.tooltip=Width of the textarea in average character widths.<br/><b>Usage:</b> <i>Controls the initial width of the textarea</i>.<br/><b>Note:</b> <i>CSS width is preferred over cols in modern design</i>.
fmdbmix_advancedTextareaSettings.wrap=Text wrapping
fmdbmix_advancedTextareaSettings.wrap.ui.tooltip=How text wrapping is handled when form is submitted.<br/><b>Soft:</b> <i>Text wraps visually but no line breaks in submitted data</i>.<br/><b>Hard:</b> <i>Line breaks are included in submitted data</i>.<br/><b>Off:</b> <i>No text wrapping</i>.
fmdbmix_advancedTextareaSettings.wrap.soft=Soft
fmdbmix_advancedTextareaSettings.wrap.hard=Hard
fmdbmix_advancedTextareaSettings.wrap.off=Off
fmdbmix_advancedTextareaSettings.form=Associated form
fmdbmix_advancedTextareaSettings.form.ui.tooltip=ID of the form this textarea belongs to.<br/><b>Usage:</b> <i>Associate textarea with a form element elsewhere on the page</i>.<br/><b>Note:</b> <i>Allows textarea to be outside the form element while still being part of it</i>.
fmdbmix_advancedTextareaSettings.dirname=Submit text direction
fmdbmix_advancedTextareaSettings.dirname.ui.tooltip=When enabled, the browser submits the detected text direction (ltr/rtl) of this field along with the form.<br/><b>Usage:</b> <i>Useful for multilingual forms where text direction may vary</i>.<br/><b>Note:</b> <i>The submitted field name will be {fieldName}.dir with value "ltr" or "rtl"</i>.
fmdbmix_advancedInputTextSettings=Advanced Settings
fmdbmix_advancedInputTextSettings.ui.tooltip=Advanced configuration options for text input behavior and accessibility.<br/><b>Usage:</b> <i>Fine-tune text input functionality for specific use cases</i>.
fmdbmix_advancedInputTextSettings.readonly=Read-only
fmdbmix_advancedInputTextSettings.readonly.ui.tooltip=Make the input read-only but still focusable.<br/><b>Usage:</b> <i>Display content that can be selected/copied but not modified</i>.<br/><b>Note:</b> <i>Read-only fields are included in form submission unlike disabled fields</i>.
fmdbmix_advancedInputTextSettings.autofocus=Auto focus
fmdbmix_advancedInputTextSettings.autofocus.ui.tooltip=Automatically focus this input when page loads.<br/><b>Usage:</b> <i>Improves accessibility and user experience</i>.<br/><b>Note:</b> <i>Only one element per page should have autofocus</i>.
fmdbmix_advancedInputTextSettings.disabled=Disabled
fmdbmix_advancedInputTextSettings.disabled.ui.tooltip=Disable the input preventing user interaction.<br/><b>Usage:</b> <i>Make field read-only and exclude from form submission</i>.<br/><b>Note:</b> <i>Disabled fields are not submitted with form data</i>.
fmdbmix_advancedInputTextSettings.form=Associated form
fmdbmix_advancedInputTextSettings.form.ui.tooltip=ID of the form this input belongs to.<br/><b>Usage:</b> <i>Associate input with a form element elsewhere on the page</i>.<br/><b>Note:</b> <i>Allows input to be outside the form element while still being part of it</i>.
fmdbmix_advancedInputTextSettings.dirname=Submit text direction
fmdbmix_advancedInputTextSettings.dirname.ui.tooltip=When enabled, the browser submits the detected text direction (ltr/rtl) of this field along with the form.<br/><b>Usage:</b> <i>Useful for multilingual forms where text direction may vary</i>.<br/><b>Note:</b> <i>The submitted field name will be {fieldName}.dir with value "ltr" or "rtl"</i>.
fmdbmix_advancedInputTextSettings.spellcheck=Spell check
fmdbmix_advancedInputTextSettings.spellcheck.ui.tooltip=Enable browser spell checking for this input.<br/><b>Usage:</b> <i>Helps users identify and correct spelling errors</i>.<br/><b>Note:</b> <i>Browser behavior may vary based on user settings</i>.
fmdbmix_advancedInputTextSettings.pattern=Pattern validation
fmdbmix_advancedInputTextSettings.pattern.ui.tooltip=Regular expression pattern for input validation.<br/><b>Usage:</b> <i>Define custom validation rules beyond standard text input</i>.<br/><b>Example:</b> <i>[A-Z]{3}-[0-9]{3} for format ABC-123</i>.<br/><b>Note:</b> <i>Works in addition to other validation attributes like minLength</i>.
fmdbmix_advancedInputTextSettings.size=Size
fmdbmix_advancedInputTextSettings.size.ui.tooltip=Width of the input in average character widths.<br/><b>Usage:</b> <i>Controls the visual width of the input field</i>.<br/><b>Recommendation:</b> <i>Use CSS classes or custom styling instead of this attribute</i>.
fmdbmix_advancedInputTextSettings.title=Title
fmdbmix_advancedInputTextSettings.title.ui.tooltip=Tooltip text that appears on hover or focus.<br/><b>Usage:</b> <i>Provide additional context or validation hints</i>.<br/><b>Example:</b> <i>Enter your username (3-20 characters)</i>.<br/><b>Accessibility:</b> <i>Helps users understand field requirements</i>.
fmdbmix_advancedInputTextSettings.autocomplete=Autocomplete
fmdbmix_advancedInputTextSettings.autocomplete.ui.tooltip=Enable browser autocomplete for this input field.<br/><b>Usage:</b><br/>- <i>'on'</i>: Enable browser autocomplete (default)<br/>- <i>'off'</i>: Disable autocomplete<br/>- <i>Custom value</i>: Any HTML5 autocomplete token (e.g., 'name', 'username', 'tel', 'street-address').
label.submitBtn=Submit
label.resetBtn=Reset
label.newFormBtn=New Form
label.tryAgainBtn=Try Again
label.previousBtn=Previous
label.nextBtn=Next
fmdb_step=Step
fmdb_step.ui.tooltip=A form step that groups form elements within a multi-step form.<br/><b>Usage:</b> <i>Add multiple steps to a form to create a wizard-like experience</i>.<br/><b>Note:</b> <i>Steps can only be direct children of a form, not nested inside other steps</i>.
fmdb_step.label=Navigation label
fmdb_step.label.ui.tooltip=Short label displayed in the steps navigation bar instead of the title.<br/><b>Example:</b> <i>Title: "User personal information" -> Label: "Personal info"</i>.<br/><b>If empty, the title is used as fallback</b>.
fmdb_step.intro=Introduction text
fmdb_step.intro.ui.tooltip=Optional introductory text displayed in the step.<br/><b>When nav is enabled:</b> <i>Shown below the navigation bar (title is already displayed there)</i>.<br/><b>When nav is disabled:</b> <i>Shown below the step title</i>.
fmdbmix_multiStep=Multi-step
fmdbmix_multiStep.ui.tooltip=Configure the multi-step behaviour of the form.
fmdbmix_multiStep.showStepsNav=Show steps navigation
fmdbmix_multiStep.showStepsNav.ui.tooltip=Display the step indicator navigation bar at the top of the form.<br/><b>When enabled:</b> <i>Step titles appear in the navigation bar only, not repeated in each step</i>.<br/><b>When disabled:</b> <i>Title and description are displayed directly inside each step</i>.
