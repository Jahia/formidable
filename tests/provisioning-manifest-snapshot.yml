- addMavenRepository: "https://devtools.jahia.com/nexus/content/groups/enterprise/@id=jahia-enterprise@snapshots"
  username: ${env:NEXUS_USERNAME}
  password: ${env:NEXUS_PASSWORD}

- addMavenRepository: "https://devtools.jahia.com/nexus/content/groups/internal/@id=jahia-internal@snapshots"
  username: ${env:NEXUS_USERNAME}
  password: ${env:NEXUS_PASSWORD}

- installBundle:
    - 'mvn:org.jahia.modules/graphql-dxm-provider'
    - 'mvn:org.jahia.modules/content-integrity'
    - 'mvn:org.jahia.modules/jcontent'
    - 'js:mvn:org.jahia.modules/formidable-elements/LATEST/tgz'
    - 'mvn:org.jahia.modules/formidable-engine'
    - 'mvn:org.jahia.test/formidable-test-module-samples-java'
    - 'js:mvn:org.jahia.test/formidable-test-module-samples-tsx/LATEST/tgz'
    - 'mvn:org.jahia.test/formidable-test-module-templateset-jsp'
    - 'js:mvn:org.jahia.test/formidable-test-module-templateset-tsx/LATEST/tgz'
  autoStart: true
  uninstallPreviousVersion: true
